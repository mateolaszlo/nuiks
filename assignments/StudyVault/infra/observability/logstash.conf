input {
  gelf {
    port => 12201
  }

  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [message] =~ "^\s*\{" {
    json {
      source => "message"
      target => "app_log"
      skip_on_invalid_json => true
    }
  }

  if [app_log][message] {
    mutate {
      replace => { "message" => "%{[app_log][message]}" }
    }
  } else if [app_log][event] {
    mutate {
      replace => { "message" => "%{[app_log][event]}" }
    }
  }

  if [app_log][levelname] {
    mutate {
      add_field => { "level" => "%{[app_log][levelname]}" }
    }
  } else if [app_log][level] {
    mutate {
      add_field => { "level" => "%{[app_log][level]}" }
    }
  }

  if [app_log][name] {
    mutate {
      add_field => { "logger" => "%{[app_log][name]}" }
    }
  }

  if [app_log][request_id] {
    mutate {
      add_field => { "request_id" => "%{[app_log][request_id]}" }
    }
  }

  if [app_log][event_name] {
    mutate {
      add_field => { "event_name" => "%{[app_log][event_name]}" }
    }
  }

  if [app_log][event_category] {
    mutate {
      add_field => { "event_category" => "%{[app_log][event_category]}" }
    }
  }

  if [app_log][path] {
    mutate {
      add_field => { "path" => "%{[app_log][path]}" }
    }
  }

  if [app_log][method] {
    mutate {
      add_field => { "method" => "%{[app_log][method]}" }
    }
  }

  if [app_log][status_code] {
    mutate {
      add_field => { "status_code" => "%{[app_log][status_code]}" }
    }
  }

  if [app_log][duration_ms] {
    mutate {
      add_field => { "duration_ms" => "%{[app_log][duration_ms]}" }
    }
  }

  if [app_log][file_id] {
    mutate {
      add_field => { "file_id" => "%{[app_log][file_id]}" }
    }
  }

  if [app_log][owner_id] {
    mutate {
      add_field => { "owner_id" => "%{[app_log][owner_id]}" }
    }
  }

  if [app_log][activity_id] {
    mutate {
      add_field => { "activity_id" => "%{[app_log][activity_id]}" }
    }
  }

  if [app_log][action] {
    mutate {
      add_field => { "action" => "%{[app_log][action]}" }
    }
  }

  if [app_log][filename] {
    mutate {
      add_field => { "filename" => "%{[app_log][filename]}" }
    }
  }

  if [app_log][mime_type] {
    mutate {
      add_field => { "mime_type" => "%{[app_log][mime_type]}" }
    }
  }

  if [app_log][size] {
    mutate {
      add_field => { "size" => "%{[app_log][size]}" }
    }
  }

  if [app_log][tags_count] {
    mutate {
      add_field => { "tags_count" => "%{[app_log][tags_count]}" }
    }
  }

  if [app_log][query] {
    mutate {
      add_field => { "query" => "%{[app_log][query]}" }
    }
  }

  if [app_log][query_length] {
    mutate {
      add_field => { "query_length" => "%{[app_log][query_length]}" }
    }
  }

  if [app_log][result_count] {
    mutate {
      add_field => { "result_count" => "%{[app_log][result_count]}" }
    }
  }

  if [app_log][downstream_service] {
    mutate {
      add_field => { "downstream_service" => "%{[app_log][downstream_service]}" }
    }
  }

  if [app_log][status] {
    mutate {
      add_field => { "status" => "%{[app_log][status]}" }
    }
  }

  if [app_log][error] {
    mutate {
      add_field => { "error" => "%{[app_log][error]}" }
    }
  }

  if [app_log][asctime] {
    mutate {
      add_field => { "event_timestamp" => "%{[app_log][asctime]}" }
    }
  } else if [app_log][timestamp] {
    mutate {
      add_field => { "event_timestamp" => "%{[app_log][timestamp]}" }
    }
  }

  if [tag] and ![service] {
    mutate {
      add_field => { "service" => "%{tag}" }
    }
  }

  if [container_name] and ![service] {
    mutate {
      add_field => { "service" => "%{container_name}" }
    }
  }

  if ![service] {
    mutate {
      add_field => { "service" => "unknown-service" }
    }
  }

  prune {
    whitelist_names => [
      "^@timestamp$",
      "^service$",
      "^message$",
      "^container_name$",
      "^level$",
      "^logger$",
      "^request_id$",
      "^event_name$",
      "^event_category$",
      "^path$",
      "^method$",
      "^status_code$",
      "^duration_ms$",
      "^event_timestamp$",
      "^file_id$",
      "^owner_id$",
      "^activity_id$",
      "^action$",
      "^filename$",
      "^mime_type$",
      "^size$",
      "^tags_count$",
      "^query$",
      "^query_length$",
      "^result_count$",
      "^downstream_service$",
      "^status$",
      "^error$"
    ]
  }

  mutate {
    convert => {
      "status_code" => "integer"
      "duration_ms" => "float"
      "size" => "integer"
      "tags_count" => "integer"
      "query_length" => "integer"
      "result_count" => "integer"
    }
  }

  ruby {
    code => "
      event.to_hash.each do |key, value|
        if value.nil? || (value.respond_to?(:empty?) && value.empty?)
          event.remove(key)
        end
      end
    "
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "studyvault-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
