services:
  frontend:
    build:
      context: ../../..
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: studyvault
      VITE_KEYCLOAK_CLIENT_ID: studyvault-frontend
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "frontend"

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      file-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      activity-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "gateway"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studyvault
      POSTGRES_USER: studyvault
      POSTGRES_PASSWORD: studyvault
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyvault -d studyvault"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8081:8080"
    volumes:
      - ../../keycloak/studyvault-realm.json:/opt/keycloak/data/import/studyvault-realm.json:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/studyvault/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q issuer <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  catalog-service:
    build:
      context: ../../..
      dockerfile: apps/catalog-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://localhost:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      CATALOG_DATABASE_URL: postgresql+psycopg://studyvault:studyvault@postgres:5432/studyvault
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "catalog-service"

  search-service:
    build:
      context: ../../..
      dockerfile: apps/search-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://localhost:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      SEARCH_MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "search-service"

  activity-service:
    build:
      context: ../../..
      dockerfile: apps/activity-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://localhost:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      ACTIVITY_MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "activity-service"

  file-service:
    build:
      context: ../../..
      dockerfile: apps/file-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_BASE_URL: http://gateway
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://localhost:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      FILE_S3_ENDPOINT: http://minio:9000
      FILE_S3_ACCESS_KEY: minioadmin
      FILE_S3_SECRET_KEY: minioadmin
      FILE_S3_BUCKET: studyvault-files
    depends_on:
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      activity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "file-service"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    ports:
      - "5000:5000"
      - "12201:12201/udp"
    volumes:
      - ../../observability/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/5000'"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/5601 && printf \"GET /api/status HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q overall <&3'",
        ]
      interval: 15s
      timeout: 5s
      retries: 40

  kibana-setup:
    image: python:3.12-slim
    command: ["python", "/app/bootstrap_kibana.py"]
    volumes:
      - ../../scripts/bootstrap_kibana.py:/app/bootstrap_kibana.py:ro
    depends_on:
      kibana:
        condition: service_healthy

volumes:
  postgres-data:
  mongodb-data:
  minio-data:
  elasticsearch-data:
