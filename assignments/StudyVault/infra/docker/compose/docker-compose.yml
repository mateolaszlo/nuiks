services:
  frontend:
    build:
      context: ../../..
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: studyvault
      VITE_KEYCLOAK_CLIENT_ID: studyvault-frontend
    depends_on:
      keycloak:
        condition: service_started

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      file-service:
        condition: service_started
      catalog-service:
        condition: service_started
      search-service:
        condition: service_started
      activity-service:
        condition: service_started
      keycloak:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studyvault
      POSTGRES_USER: studyvault
      POSTGRES_PASSWORD: studyvault
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ../../keycloak/studyvault-realm.json:/opt/keycloak/data/import/studyvault-realm.json:ro

  catalog-service:
    build:
      context: ../../..
      dockerfile: apps/catalog-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://keycloak:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      CATALOG_DATABASE_URL: postgresql+psycopg://studyvault:studyvault@postgres:5432/studyvault
    depends_on:
      postgres:
        condition: service_started
      keycloak:
        condition: service_started

  search-service:
    build:
      context: ../../..
      dockerfile: apps/search-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://keycloak:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      SEARCH_MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_started
      keycloak:
        condition: service_started

  activity-service:
    build:
      context: ../../..
      dockerfile: apps/activity-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://keycloak:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      ACTIVITY_MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_started
      keycloak:
        condition: service_started

  file-service:
    build:
      context: ../../..
      dockerfile: apps/file-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_BASE_URL: http://gateway
      STUDYVAULT_INTERNAL_TOKEN: internal-demo-token
      KEYCLOAK_ISSUER_URL: http://keycloak:8080/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      FILE_S3_ENDPOINT: http://minio:9000
      FILE_S3_ACCESS_KEY: minioadmin
      FILE_S3_SECRET_KEY: minioadmin
      FILE_S3_BUCKET: studyvault-files
    depends_on:
      minio:
        condition: service_started
      keycloak:
        condition: service_started
      catalog-service:
        condition: service_started
      search-service:
        condition: service_started
      activity-service:
        condition: service_started

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    ports:
      - "5000:5000"
    volumes:
      - ../../observability/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      elasticsearch:
        condition: service_started

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_started

volumes:
  postgres-data:
  mongodb-data:
  minio-data:
  elasticsearch-data:
