      add_field => { "event_category" => "%{[app_log][event_category]}" }
    }
  }

  if [app_event][path] {
    mutate {
      add_field => { "path" => "%{[app_event][path]}" }
    }
  } else if [app_log][path] {
    mutate {
      add_field => { "path" => "%{[app_log][path]}" }
    }
  }

  if [app_event][route_template] {
    mutate {
      add_field => { "route_template" => "%{[app_event][route_template]}" }
    }
  } else if [app_log][route_template] {
    mutate {
      add_field => { "route_template" => "%{[app_log][route_template]}" }
    }
  }

  if [app_event][method] {
    mutate {
      add_field => { "method" => "%{[app_event][method]}" }
    }
  } else if [app_log][method] {
    mutate {
      add_field => { "method" => "%{[app_log][method]}" }
    }
  }

  if [app_event][status_code] {
    mutate {
      add_field => { "status_code" => "%{[app_event][status_code]}" }
    }
  } else if [app_log][status_code] {
    mutate {
      add_field => { "status_code" => "%{[app_log][status_code]}" }
    }
  }

  if [app_event][duration_ms] {
    mutate {
      add_field => { "duration_ms" => "%{[app_event][duration_ms]}" }
    }
  } else if [app_log][duration_ms] {
    mutate {
      add_field => { "duration_ms" => "%{[app_log][duration_ms]}" }
    }
  }

  if [app_event][scheme] {
    mutate {
      add_field => { "scheme" => "%{[app_event][scheme]}" }
    }
  } else if [app_log][scheme] {
    mutate {
      add_field => { "scheme" => "%{[app_log][scheme]}" }
    }
  }

  if [app_event][host] {
    mutate {
      add_field => { "host_name" => "%{[app_event][host]}" }
    }
  } else if [app_log][host] {
    mutate {
      add_field => { "host_name" => "%{[app_log][host]}" }
    }
  }

  if [app_event][client_ip] {
    mutate {
      add_field => { "client_ip" => "%{[app_event][client_ip]}" }
    }
  } else if [app_log][client_ip] {
    mutate {
      add_field => { "client_ip" => "%{[app_log][client_ip]}" }
    }
  }

  if [app_event][client_ip_source] {
    mutate {
      add_field => { "client_ip_source" => "%{[app_event][client_ip_source]}" }
    }
  } else if [app_log][client_ip_source] {
    mutate {
      add_field => { "client_ip_source" => "%{[app_log][client_ip_source]}" }
    }
  }

  if [app_event][forwarded_for] {
    mutate {
      add_field => { "forwarded_for" => "%{[app_event][forwarded_for]}" }
    }
  } else if [app_log][forwarded_for] {
    mutate {
      add_field => { "forwarded_for" => "%{[app_log][forwarded_for]}" }
    }
  }

  if [app_event][user_agent] {
    mutate {
      add_field => { "[user_agent][original]" => "%{[app_event][user_agent]}" }
    }
  } else if [app_log][user_agent] {
    mutate {
      add_field => { "[user_agent][original]" => "%{[app_log][user_agent]}" }
    }
  }

  if [app_event][request_outcome] {
    mutate {
      add_field => { "request_outcome" => "%{[app_event][request_outcome]}" }
    }
  } else if [app_log][request_outcome] {
    mutate {
      add_field => { "request_outcome" => "%{[app_log][request_outcome]}" }
    }
  }

  if [app_event][request_content_length] {
    mutate {
      add_field => { "request_content_length" => "%{[app_event][request_content_length]}" }
    }
  } else if [app_log][request_content_length] {
    mutate {
      add_field => { "request_content_length" => "%{[app_log][request_content_length]}" }
    }
  }

  if [app_event][request_content_type] {
    mutate {
      add_field => { "request_content_type" => "%{[app_event][request_content_type]}" }
    }
  } else if [app_log][request_content_type] {
    mutate {
      add_field => { "request_content_type" => "%{[app_log][request_content_type]}" }
    }
  }

  if [app_event][response_content_length] {
    mutate {
      add_field => { "response_content_length" => "%{[app_event][response_content_length]}" }
    }
  } else if [app_log][response_content_length] {
    mutate {
      add_field => { "response_content_length" => "%{[app_log][response_content_length]}" }
    }
  }

  if [app_event][response_content_type] {
    mutate {
      add_field => { "response_content_type" => "%{[app_event][response_content_type]}" }
    }
  } else if [app_log][response_content_type] {
    mutate {
      add_field => { "response_content_type" => "%{[app_log][response_content_type]}" }
    }
  }

  if [app_event][file_id] {
    mutate {
      add_field => { "file_id" => "%{[app_event][file_id]}" }
    }
  } else if [app_log][file_id] {
    mutate {
      add_field => { "file_id" => "%{[app_log][file_id]}" }
    }
  }

  if [app_event][owner_id] {
    mutate {
      add_field => { "owner_id" => "%{[app_event][owner_id]}" }
    }
  } else if [app_log][owner_id] {
    mutate {
      add_field => { "owner_id" => "%{[app_log][owner_id]}" }
    }
  }

  if [app_event][user_id] {
    mutate {
      add_field => { "user_id" => "%{[app_event][user_id]}" }
    }
  } else if [app_log][user_id] {
    mutate {
      add_field => { "user_id" => "%{[app_log][user_id]}" }
    }
  }

  if [app_event][username] {
    mutate {
      add_field => { "username" => "%{[app_event][username]}" }
    }
  } else if [app_log][username] {
    mutate {
      add_field => { "username" => "%{[app_log][username]}" }
    }
  }

  if [app_event][email] {
    mutate {
      add_field => { "email" => "%{[app_event][email]}" }
    }
  } else if [app_log][email] {
    mutate {
      add_field => { "email" => "%{[app_log][email]}" }
    }
  }

  if [app_event][owner_username] {
    mutate {
      add_field => { "owner_username" => "%{[app_event][owner_username]}" }
    }
  } else if [app_log][owner_username] {
    mutate {
      add_field => { "owner_username" => "%{[app_log][owner_username]}" }
    }
  }

  if [app_event][owner_email] {
    mutate {
      add_field => { "owner_email" => "%{[app_event][owner_email]}" }
    }
  } else if [app_log][owner_email] {
    mutate {
      add_field => { "owner_email" => "%{[app_log][owner_email]}" }
    }
  }

  if [app_event][activity_id] {
    mutate {
      add_field => { "activity_id" => "%{[app_event][activity_id]}" }
    }
  } else if [app_log][activity_id] {
    mutate {
      add_field => { "activity_id" => "%{[app_log][activity_id]}" }
    }
  }

  if [app_event][action] {
    mutate {
      add_field => { "action" => "%{[app_event][action]}" }
    }
  } else if [app_log][action] {
    mutate {
      add_field => { "action" => "%{[app_log][action]}" }
    }
  }

  if [app_event][filename] {
    mutate {
      add_field => { "filename" => "%{[app_event][filename]}" }
    }
  } else if [app_log][filename] {
    mutate {
      add_field => { "filename" => "%{[app_log][filename]}" }
    }
  }

  if [app_event][mime_type] {
    mutate {
      add_field => { "mime_type" => "%{[app_event][mime_type]}" }
    }
  } else if [app_log][mime_type] {
    mutate {
      add_field => { "mime_type" => "%{[app_log][mime_type]}" }
    }
  }

  if [app_event][size] {
    mutate {
      add_field => { "size" => "%{[app_event][size]}" }
    }
  } else if [app_log][size] {
    mutate {
      add_field => { "size" => "%{[app_log][size]}" }
    }
  }

  if [app_event][tags_count] {
    mutate {
      add_field => { "tags_count" => "%{[app_event][tags_count]}" }
    }
  } else if [app_log][tags_count] {
    mutate {
      add_field => { "tags_count" => "%{[app_log][tags_count]}" }
    }
  }

  if [app_event][query] {
    mutate {
      add_field => { "query" => "%{[app_event][query]}" }
    }
  } else if [app_log][query] {
    mutate {
      add_field => { "query" => "%{[app_log][query]}" }
    }
  }

  if [app_event][query_length] {
    mutate {
      add_field => { "query_length" => "%{[app_event][query_length]}" }
    }
  } else if [app_log][query_length] {
    mutate {
      add_field => { "query_length" => "%{[app_log][query_length]}" }
    }
  }

  if [app_event][result_count] {
    mutate {
      add_field => { "result_count" => "%{[app_event][result_count]}" }
    }
  } else if [app_log][result_count] {
    mutate {
      add_field => { "result_count" => "%{[app_log][result_count]}" }
    }
  }

  if [app_event][downstream_service] {
    mutate {
      add_field => { "downstream_service" => "%{[app_event][downstream_service]}" }
    }
  } else if [app_log][downstream_service] {
    mutate {
      add_field => { "downstream_service" => "%{[app_log][downstream_service]}" }
    }
  }

  if [app_event][status] {
    mutate {
      add_field => { "status" => "%{[app_event][status]}" }
    }
  } else if [app_log][status] {
    mutate {
      add_field => { "status" => "%{[app_log][status]}" }
    }
  }

  if [app_event][error] {
    mutate {
      add_field => { "error" => "%{[app_event][error]}" }
    }
  } else if [app_log][error] {
    mutate {
      add_field => { "error" => "%{[app_log][error]}" }
    }
  }

  if [app_event][actor_user_id] {
    mutate {
      add_field => { "actor_user_id" => "%{[app_event][actor_user_id]}" }
    }
  }

  if [app_event][actor_username] {
    mutate {
      add_field => { "actor_username" => "%{[app_event][actor_username]}" }
    }
  }

  if [app_event][actor_email] {
    mutate {
      add_field => { "actor_email" => "%{[app_event][actor_email]}" }
    }
  }

  if [app_event][target_user_id] {
    mutate {
      add_field => { "target_user_id" => "%{[app_event][target_user_id]}" }
    }
  }

  if [app_event][target_username] {
    mutate {
      add_field => { "target_username" => "%{[app_event][target_username]}" }
    }
  }

  if [app_event][target_email] {
    mutate {
      add_field => { "target_email" => "%{[app_event][target_email]}" }
    }
  }

  if [app_event][timestamp] {
    mutate {
      add_field => { "event_timestamp" => "%{[app_event][timestamp]}" }
    }
  } else if [app_log][asctime] {
    mutate {
      add_field => { "event_timestamp" => "%{[app_log][asctime]}" }
    }
  } else if [app_log][timestamp] {
    mutate {
      add_field => { "event_timestamp" => "%{[app_log][timestamp]}" }
    }
  }

  if [tag] and ![service] {
    mutate {
      add_field => { "service" => "%{tag}" }
    }
  }

  if [container_name] and ![service] {
    mutate {
      add_field => { "service" => "%{container_name}" }
    }
  }

  if ![service] {
    mutate {
      add_field => { "service" => "unknown-service" }
    }
  }

  if [service] == "gateway" {
    # 1. Drop health check noise (existing logic)
    if [message] =~ /127\.0\.0\.1/ and [message] =~ /"Wget/ {
      drop {}
    }

    # 2. Parse the Nginx "Combined" log format
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }

    # 3. Rename fields to match your existing StudyVault schema/whitelist
    mutate {
      rename => { "clientip" => "client_ip" }
      rename => { "response" => "status_code" }
      rename => { "bytes" => "response_content_length" }
      rename => { "verb" => "method" }
      rename => { "request" => "path" }
      rename => { "agent" => "user_agent_string" }
    }
  
    
    # Parse Nginx timestamp and copy it to event_timestamp for consistency
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
      target => "@timestamp"
    }
    mutate {
      add_field => { "event_timestamp" => "%{@timestamp}" }
    }
  }

  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "client_geo"
    }
  }

  if [event_timestamp] {
    date {
      match => ["event_timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss,SSS"]
      target => "@timestamp"
    }
    mutate {
      replace => { "event_timestamp" => "%{@timestamp}" }
    }
  }

  prune {
    whitelist_names => [
      "^@timestamp$",
      "^service$",
      "^message$",
      "^container_name$",
      "^log_level$",
      "^syslog_level$",
      "^logger$",
      "^request_id$",
      "^event_name$",
      "^event_category$",
      "^path$",
      "^route_template$",
      "^method$",
      "^status_code$",
      "^duration_ms$",
      "^scheme$",
      "^host_name$",
      "^client_ip$",
      "^client_ip_source$",
      "^forwarded_for$",
      "^user_agent$",
      "^request_outcome$",
      "^request_content_length$",
      "^request_content_type$",
      "^response_content_length$",
      "^response_content_type$",
      "^client_geo$",
      "^event_timestamp$",
      "^file_id$",
      "^owner_id$",
      "^user_id$",
      "^username$",
      "^email$",
      "^owner_username$",
      "^owner_email$",
      "^activity_id$",
      "^action$",
      "^filename$",
      "^mime_type$",
      "^size$",
      "^tags_count$",
      "^query$",
      "^query_length$",
      "^result_count$",
      "^downstream_service$",
      "^status$",
      "^error$",
      "^actor_user_id$",
      "^actor_username$",
      "^actor_email$",
      "^target_user_id$",
      "^target_username$",
      "^target_email$",
      "^referrer$"
    ]
  }

  mutate {
    convert => {
      "syslog_level" => "integer"
      "status_code" => "integer"
      "duration_ms" => "float"
      "request_content_length" => "integer"
      "response_content_length" => "integer"
      "size" => "integer"
      "tags_count" => "integer"
      "query_length" => "integer"
      "result_count" => "integer"
    }
  }

  ruby {
    code => "
      event.to_hash.each do |key, value|
        if value.nil? || (value.respond_to?(:empty?) && value.empty?)
          event.remove(key)
        end
      end
    "
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "studyvault-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
