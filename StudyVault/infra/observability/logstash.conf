    mutate {
      add_field => { "request_id" => "%{[app_event][request_id]}" }
    }
  } else if [app_log][request_id] {
    mutate {
      add_field => { "request_id" => "%{[app_log][request_id]}" }
    }
  }

  if [app_event][event_name] {
    mutate {
      add_field => { "event_name" => "%{[app_event][event_name]}" }
    }
  } else if [app_log][event_name] {
    mutate {
      add_field => { "event_name" => "%{[app_log][event_name]}" }
    }
  }

