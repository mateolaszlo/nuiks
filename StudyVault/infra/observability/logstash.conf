input {
  gelf {
    port => 12201
  }

  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [level] {
    mutate {
      rename => { "level" => "syslog_level" }
    }
  }

  if [message] =~ "^\s*\{" {
    json {
      source => "message"
      target => "app_log"
      skip_on_invalid_json => true
    }
  }

  if [app_log][message] =~ "^\s*\{" {
    json {
      source => "[app_log][message]"
      target => "app_event"
      skip_on_invalid_json => true
    }
  }

  if [app_event][event] {
    mutate {
      replace => { "message" => "%{[app_event][event]}" }
    }
  } else if [app_log][message] {
    mutate {
      replace => { "message" => "%{[app_log][message]}" }
    }
  } else if [app_log][event] {
    mutate {
      replace => { "message" => "%{[app_log][event]}" }
    }
  }

  if [app_event][service] {
    mutate {
      add_field => { "service" => "%{[app_event][service]}" }
    }
  } else if [app_log][service] {
    mutate {
      add_field => { "service" => "%{[app_log][service]}" }
    }
  }

  if [app_event][level] {
    mutate {
      add_field => { "log_level" => "%{[app_event][level]}" }
    }
  } else if [app_log][levelname] {
    mutate {
      add_field => { "log_level" => "%{[app_log][levelname]}" }
    }
  } else if [app_log][level] {
    mutate {
      add_field => { "log_level" => "%{[app_log][level]}" }
    }
  }

