services:
  frontend:
    build:
      context: ../../..
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_KEYCLOAK_REALM: studyvault
      VITE_KEYCLOAK_CLIENT_ID: studyvault-frontend
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "frontend"

  gateway:
    image: nginx:1.27-alpine
    command: ["/bin/sh", "/app/render-nginx.sh"]
    environment:
      STUDYVAULT_AUTH_RATE: ${STUDYVAULT_AUTH_RATE:-30r/m}
      STUDYVAULT_AUTH_BURST: ${STUDYVAULT_AUTH_BURST:-10}
      STUDYVAULT_AUTH_NAV_RATE: ${STUDYVAULT_AUTH_NAV_RATE:-120r/m}
      STUDYVAULT_AUTH_NAV_BURST: ${STUDYVAULT_AUTH_NAV_BURST:-60}
      STUDYVAULT_UPLOAD_RATE: ${STUDYVAULT_UPLOAD_RATE:-10r/m}
      STUDYVAULT_UPLOAD_BURST: ${STUDYVAULT_UPLOAD_BURST:-5}
      STUDYVAULT_SEARCH_RATE: ${STUDYVAULT_SEARCH_RATE:-60r/m}
      STUDYVAULT_SEARCH_BURST: ${STUDYVAULT_SEARCH_BURST:-20}
      STUDYVAULT_ADMIN_RATE: ${STUDYVAULT_ADMIN_RATE:-120r/m}
      STUDYVAULT_ADMIN_BURST: ${STUDYVAULT_ADMIN_BURST:-30}
    ports:
      - "${STUDYVAULT_GATEWAY_BIND_ADDRESS:-0.0.0.0}:8080:80"
    volumes:
      - ../../nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ../../nginx/cloudflare-realip.conf:/etc/nginx/cloudflare-realip.conf:ro
      - ../../nginx/render-nginx.sh:/app/render-nginx.sh:ro
    depends_on:
      frontend:
        condition: service_healthy
      file-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      activity-service:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "gateway"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studyvault
      POSTGRES_USER: studyvault
      POSTGRES_PASSWORD: studyvault
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-studyvault-keycloak-db-password-change-me}
    ports:
      - "${STUDYVAULT_DB_BIND_ADDRESS:-127.0.0.1}:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyvault -d studyvault"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7
    ports:
      - "${STUDYVAULT_DB_BIND_ADDRESS:-127.0.0.1}:27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    profiles: ["local-minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${STUDYVAULT_ADMIN_BIND_ADDRESS:-127.0.0.1}:9000:9000"
      - "${STUDYVAULT_ADMIN_BIND_ADDRESS:-127.0.0.1}:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-studyvault-keycloak-db-password-change-me}
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${STUDYVAULT_PUBLIC_BASE_URL:-http://localhost:8080}
      KC_HOSTNAME_STRICT: "false"
      STUDYVAULT_PUBLIC_BASE_URL: ${STUDYVAULT_PUBLIC_BASE_URL:-http://localhost:8080}
    ports:
      - "${STUDYVAULT_ADMIN_BIND_ADDRESS:-127.0.0.1}:8081:8080"
    volumes:
      - keycloak-import-data:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-realm-render:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/studyvault/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q issuer <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  keycloak-realm-render:
    image: alpine:3.20
    command:
      - /bin/sh
      - /app/render_studyvault_realm.sh
      - /app/studyvault-realm.template.json
      - /rendered/studyvault-realm.json
    environment:
      STUDYVAULT_PUBLIC_BASE_URL: ${STUDYVAULT_PUBLIC_BASE_URL:-http://localhost:8080}
    volumes:
      - ../../keycloak/studyvault-realm.template.json:/app/studyvault-realm.template.json:ro
      - ../../scripts/render_studyvault_realm.sh:/app/render_studyvault_realm.sh:ro
      - keycloak-import-data:/rendered

  catalog-service:
    build:
      context: ../../..
      dockerfile: apps/catalog-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: ${STUDYVAULT_INTERNAL_TOKEN:-studyvault-internal-token-change-me}
      KEYCLOAK_ISSUER_URL: ${STUDYVAULT_PUBLIC_BASE_URL:-http://localhost:8080}/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      CATALOG_DATABASE_URL: postgresql+psycopg://studyvault:studyvault@postgres:5432/studyvault
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "catalog-service"

  search-service:
    build:
      context: ../../..
      dockerfile: apps/search-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: ${STUDYVAULT_INTERNAL_TOKEN:-studyvault-internal-token-change-me}
      KEYCLOAK_ISSUER_URL: ${STUDYVAULT_PUBLIC_BASE_URL:-http://localhost:8080}/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      SEARCH_MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "search-service"

  activity-service:
    build:
      context: ../../..
      dockerfile: apps/activity-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      STUDYVAULT_INTERNAL_TOKEN: ${STUDYVAULT_INTERNAL_TOKEN:-studyvault-internal-token-change-me}
      KEYCLOAK_ISSUER_URL: ${STUDYVAULT_PUBLIC_BASE_URL:-http://localhost:8080}/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}}
      ACTIVITY_MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "activity-service"

  file-service:
    build:
      context: ../../..
      dockerfile: apps/file-service/Dockerfile
    environment:
      STUDYVAULT_AUTH_DISABLED: "false"
      CATALOG_INTERNAL_URL: http://catalog-service:8000
      SEARCH_INTERNAL_URL: http://search-service:8000
      ACTIVITY_INTERNAL_URL: http://activity-service:8000
      STUDYVAULT_INTERNAL_TOKEN: ${STUDYVAULT_INTERNAL_TOKEN:-studyvault-internal-token-change-me}
      KEYCLOAK_ISSUER_URL: ${STUDYVAULT_PUBLIC_BASE_URL:-http://localhost:8080}/realms/studyvault
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/studyvault/protocol/openid-connect/certs
      FILE_S3_ENDPOINT: ${FILE_S3_ENDPOINT:-http://10.0.0.10:9000}
      FILE_S3_ACCESS_KEY: ${FILE_S3_ACCESS_KEY:-replace-with-minio-access-key}
      FILE_S3_SECRET_KEY: ${FILE_S3_SECRET_KEY:-replace-with-minio-secret-key}
      FILE_S3_BUCKET: ${FILE_S3_BUCKET:-studyvault-files}
      FILE_S3_REGION: ${FILE_S3_REGION:-us-east-1}
    depends_on:
      keycloak:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      activity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "file-service"

  purge-worker:
    build:
      context: ../../..
      dockerfile: apps/purge-worker/Dockerfile
    environment:
      CATALOG_INTERNAL_URL: http://catalog-service:8000
      FILE_INTERNAL_URL: http://file-service:8000
      SEARCH_INTERNAL_URL: http://search-service:8000
      STUDYVAULT_INTERNAL_TOKEN: ${STUDYVAULT_INTERNAL_TOKEN:-studyvault-internal-token-change-me}
      PURGE_RUN_MODE: loop
      PURGE_INTERVAL_SECONDS: 3600
    depends_on:
      catalog-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "purge-worker"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${STUDYVAULT_ADMIN_BIND_ADDRESS:-127.0.0.1}:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    ports:
      - "${STUDYVAULT_ADMIN_BIND_ADDRESS:-127.0.0.1}:12201:12201/udp"
    volumes:
      - ../../observability/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/5000'"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "${STUDYVAULT_ADMIN_BIND_ADDRESS:-127.0.0.1}:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/5601 && printf \"GET /api/status HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q overall <&3'",
        ]
      interval: 15s
      timeout: 5s
      retries: 40

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.15.3
    user: root
    command: ["metricbeat", "-e", "-strict.perms=false"]
    volumes:
      - ../../observability/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/hostfs/proc:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /:/hostfs:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5066/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30

  kibana-setup:
    image: python:3.12-slim
    command: ["python", "/app/bootstrap_kibana.py"]
    volumes:
      - ../../scripts/bootstrap_kibana.py:/app/bootstrap_kibana.py:ro
      - ../../kibana:/app/kibana:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy

volumes:
  postgres-data:
  mongodb-data:
  minio-data:
  elasticsearch-data:
  keycloak-import-data:
