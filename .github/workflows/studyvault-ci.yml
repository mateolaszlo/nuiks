name: StudyVault CI

on:
  push:
    paths:
      - "assignments/StudyVault/**"
      - ".github/workflows/studyvault-ci.yml"
  pull_request:
    paths:
      - "assignments/StudyVault/**"
      - ".github/workflows/studyvault-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assignments/StudyVault
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: PYTHONPATH=. pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: assignments/StudyVault/apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: assignments/StudyVault/apps/frontend
        run: npm ci

      - name: Run frontend typecheck and build
        working-directory: assignments/StudyVault/apps/frontend
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose -f infra/docker/compose/docker-compose.yml config

  runtime:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: assignments/StudyVault
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: assignments/StudyVault/apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: assignments/StudyVault/apps/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: assignments/StudyVault/apps/frontend
        run: |
          npx playwright --version
          npx playwright install --with-deps chromium

      - name: Start Docker Compose stack
        run: docker compose -f infra/docker/compose/docker-compose.yml up -d --build

      - name: Verify runtime stack
        run: python tests/smoke/runtime_smoke.py

      - name: Run Playwright E2E
        working-directory: assignments/StudyVault/apps/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          ELASTICSEARCH_URL: http://localhost:9200
        run: npm run test:e2e

      - name: Dump Docker Compose logs on failure
        if: failure()
        run: docker compose -f infra/docker/compose/docker-compose.yml logs --no-color

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose -f infra/docker/compose/docker-compose.yml down -v
