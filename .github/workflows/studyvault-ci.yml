name: StudyVault CI

on:
  push:
    paths:
      - "assignments/StudyVault/**"
      - ".github/workflows/studyvault-ci.yml"
  pull_request:
    paths:
      - "assignments/StudyVault/**"
      - ".github/workflows/studyvault-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assignments/StudyVault
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: PYTHONPATH=. pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: assignments/StudyVault/apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: assignments/StudyVault/apps/frontend
        run: npm ci

      - name: Run frontend typecheck and build
        working-directory: assignments/StudyVault/apps/frontend
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose -f infra/docker/compose/docker-compose.yml config
