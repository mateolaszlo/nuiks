name: StudyVault CI

permissions:
  contents: read

on:
  push:
    branches:
      - testing
      - main
    paths:
      - "StudyVault/**"
      - ".github/workflows/studyvault-ci.yml"
  pull_request:
    paths:
      - "StudyVault/**"
      - ".github/workflows/studyvault-ci.yml"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          chmod +x /tmp/gitleaks

      - name: Run gitleaks
        run: /tmp/gitleaks git . --config .gitleaks.toml --redact --exit-code 2

  pytest:
    if: github.event_name == 'push' && github.ref == 'refs/heads/testing'
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: StudyVault
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create StudyVault virtualenv
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: .venv/bin/pip install -r requirements.txt

      - name: Run pytest
        run: PYTHONPATH=. .venv/bin/pytest -q

  full-test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: StudyVault
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create StudyVault virtualenv
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: .venv/bin/pip install -r requirements.txt

      - name: Run pytest
        run: PYTHONPATH=. .venv/bin/pytest -q

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: StudyVault/apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: StudyVault/apps/frontend
        run: npm ci

      - name: Run frontend typecheck and build
        working-directory: StudyVault/apps/frontend
        run: npm run build

      - name: Run frontend bundle security scan
        run: .venv/bin/python tests/smoke/check_frontend_dist_security.py

      - name: Validate Docker Compose
        run: docker compose --profile local-minio --env-file .env.example -f infra/docker/compose/docker-compose.yml config

      - name: Start StudyVault stack
        run: docker compose --profile local-minio --env-file .env.example -f infra/docker/compose/docker-compose.yml up -d --build

      - name: Run runtime smoke test
        run: .venv/bin/python tests/smoke/runtime_smoke.py

      - name: Install Playwright browser
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: StudyVault/apps/frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: StudyVault/apps/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          ELASTICSEARCH_URL: http://localhost:9200
        run: npm run test:e2e

      - name: Dump Compose status on failure
        if: failure()
        run: docker compose --profile local-minio --env-file .env.example -f infra/docker/compose/docker-compose.yml ps

      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose --profile local-minio --env-file .env.example -f infra/docker/compose/docker-compose.yml logs --no-color

      - name: Stop StudyVault stack
        if: always()
        run: docker compose --profile local-minio --env-file .env.example -f infra/docker/compose/docker-compose.yml down -v
